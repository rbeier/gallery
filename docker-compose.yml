services:
  cms:
    image: ${CMS_IMAGE:-gallery-cms:latest}
    build:
      context: ./cms
      dockerfile: Dockerfile
    restart: always
    environment:
      HOST: 0.0.0.0
      PORT: 1337
      NODE_ENV: production
      DATABASE_CLIENT: sqlite
      DATABASE_FILENAME: /data/data.db
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    ports:
      - "127.0.0.1:${CMS_PORT:-1337}:1337"
    volumes:
      - ./cms-data/database:/data
      - ./cms-data/uploads:/app/public/uploads

  frontend:
    image: ${FRONTEND_IMAGE:-gallery-frontend:latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      PORT: 4000
      NODE_ENV: production
      STRAPI_BASE_URL: http://cms:1337
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-4000}:4000"
    depends_on:
      - cms
