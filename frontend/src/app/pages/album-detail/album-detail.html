<app-content-shell>
  @if (album(); as album) {
    <div class="mb-[clamp(18px,3vw,28px)]">
      <h1 class="font-serif text-[clamp(30px,5.4vw,48px)] font-normal tracking-[-.015em]">
        {{ album.name }}
      </h1>
      <p class="mt-[10px] max-w-[34em] text-[15px] leading-[1.6] text-muted">
        {{ album.description }}
      </p>
      <div class="mt-[14px] font-mono text-[11px] tracking-[.06em] text-muted">
        {{ album.count }} photos
      </div>
    </div>
    <app-photo-grid [photos]="photos()" [linkParams]="{ from: 'album:' + album.id }" />
  } @else {
    <div class="py-16 text-center font-serif text-[20px] text-muted">Album not found.</div>
  }
</app-content-shell>
