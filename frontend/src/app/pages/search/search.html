<app-content-shell>
  <div class="mb-[clamp(20px,3vw,30px)]">
    <div class="flex items-center gap-3 border-b-[1.5px] border-ink pb-3">
      <span class="text-muted" aria-hidden="true">
        <svg viewBox="0 -960 960 960" aria-hidden="true" class="h-6 w-6 fill-current">
          <path
            d="M787.64-137.33 530.87-394.1q-29.9 25.86-69.43 40.06-39.54 14.19-81.75 14.19-101.9 0-172.72-70.74-70.81-70.74-70.81-171.85 0-101.1 70.74-171.84 70.74-70.74 172.32-70.74 100.92 0 171.64 70.74 70.73 70.74 70.73 171.75 0 42.4-14.39 81.94-14.38 39.54-40.53 70.69l257.17 256.1-36.2 36.47ZM379.28-390.1q80.24 0 136.15-55.96 55.9-55.97 55.9-136.38t-55.9-136.37q-55.91-55.96-136.15-55.96-80.69 0-136.78 55.96t-56.09 136.37q0 80.41 56.09 136.38 56.09 55.96 136.78 55.96Z"
          />
        </svg>
      </span>
      <label class="sr-only" for="search-input">Search photographs</label>
      <input
        id="search-input"
        [value]="q()"
        (input)="onQuery($any($event.target).value)"
        placeholder="Search photographs…"
        class="flex-1 border-0 bg-transparent font-serif text-[clamp(20px,3vw,28px)] font-thin text-ink outline-none"
        autocomplete="off"
      />
    </div>

    @for (group of gallery.facets(); track group.kind) {
      <app-facet-group
        [group]="group"
        [selected]="selectedFor(group.kind)"
        (toggle)="toggle(group.kind, $event)"
      />
    }

    <div
      class="mt-6 border-t border-line pt-4 font-mono text-[11px] tracking-[.06em] text-muted"
      aria-live="polite"
    >
      {{ resultLabel() }}
    </div>
  </div>

  @if (results().length) {
    <app-photo-grid [photos]="results()" [linkParams]="linkParams()" />
  } @else {
    <div class="py-10 text-center font-serif text-[20px] text-muted">
      No photographs match those filters.
    </div>
  }
</app-content-shell>
