<app-content-shell>
  <header class="mb-[clamp(26px,4vw,40px)]">
    <div class="flex items-center gap-[18px]">
      @if (profile.avatar) {
        <img
          [src]="profile.avatar"
          [attr.srcset]="profile.avatarSrcset"
          sizes="76px"
          [alt]="profile.name"
          width="76"
          height="76"
          decoding="async"
          class="h-[76px] w-[76px] flex-none rounded-full object-cover ring-1 ring-line"
        />
      }
      <div class="min-w-0">
        <h1 class="m-0 font-serif text-display font-normal">{{ profile.heading }}</h1>
        @if (profile.location) {
          <div class="mt-[6px] font-mono text-[11px] uppercase tracking-[.14em] text-muted">
            {{ profile.location }}
          </div>
        }
      </div>
    </div>

    @if (profile.bio) {
      <p class="mt-[18px] max-w-[42em] text-[15px] leading-[1.65] text-ink/80">{{ profile.bio }}</p>
    }
  </header>

  <!-- Tabs + search. Stacked on mobile (search on top via col-reverse); one row
       (search aligned to the tab bar) on desktop. -->
  <div
    class="mb-[clamp(20px,3vw,30px)] flex flex-col-reverse gap-4 d:flex-row d:items-center d:justify-between d:gap-6"
  >
    <!-- Photos / Albums tabs. The active marker slides between the two labels. -->
    <div
      role="tablist"
      aria-label="Gallery view"
      [attr.data-active]="tab()"
      class="relative flex w-full border-b border-line d:w-fit"
    >
    <button
      type="button"
      role="tab"
      [attr.aria-selected]="tab() === 'photos'"
      (click)="select('photos')"
      class="flex-1 cursor-pointer border-0 bg-transparent pb-[11px] text-center font-serif text-heading font-medium transition-colors d:w-[112px] d:flex-none"
      [class.text-ink]="tab() === 'photos'"
      [class.text-muted]="tab() !== 'photos'"
    >
      Photos
    </button>
    <button
      type="button"
      role="tab"
      [attr.aria-selected]="tab() === 'albums'"
      (click)="select('albums')"
      class="flex-1 cursor-pointer border-0 bg-transparent pb-[11px] text-center font-serif text-heading font-medium transition-colors d:w-[112px] d:flex-none"
      [class.text-ink]="tab() === 'albums'"
      [class.text-muted]="tab() !== 'albums'"
    >
      Albums
    </button>
    <!-- Slides to the active tab. Width equals one tab (50% mobile / 112px
         desktop); position + transition live in home.css keyed off data-active
         so Angular never rewrites the animated `left` (which fights the
         transition). left:50% lands on the second tab at both breakpoints. -->
    <span
      aria-hidden="true"
      class="tab-underline pointer-events-none absolute bottom-[-1px] h-[2px] w-1/2 bg-accent d:w-[112px]"
    ></span>
    </div>

    <a
      routerLink="/search"
      class="flex w-full max-w-[440px] cursor-pointer items-center gap-[10px] rounded-[26px] bg-chip px-4 py-[11px] text-[13.5px] text-muted focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ink d:w-[360px]"
    >
      <svg viewBox="0 -960 960 960" aria-hidden="true" class="h-[18px] w-[18px] flex-none fill-current">
        <path
          d="M787.64-137.33 530.87-394.1q-29.9 25.86-69.43 40.06-39.54 14.19-81.75 14.19-101.9 0-172.72-70.74-70.81-70.74-70.81-171.85 0-101.1 70.74-171.84 70.74-70.74 172.32-70.74 100.92 0 171.64 70.74 70.73 70.74 70.73 171.75 0 42.4-14.39 81.94-14.38 39.54-40.53 70.69l257.17 256.1-36.2 36.47ZM379.28-390.1q80.24 0 136.15-55.96 55.9-55.97 55.9-136.38t-55.9-136.37q-55.91-55.96-136.15-55.96-80.69 0-136.78 55.96t-56.09 136.37q0 80.41 56.09 136.38 56.09 55.96 136.78 55.96Z"
        />
      </svg>
      Search tags, lens, place, date…
    </a>
  </div>

  <!-- Each grid is created on first visit (@if) then kept in the DOM and just
       hidden ([hidden]) — so tabs don't re-request images on switch, and a tab
       that starts hidden doesn't load anything until it's opened. -->
  <div role="tabpanel" [hidden]="tab() !== 'photos'">
    @if (photosSeen()) {
      <app-photo-grid [photos]="gallery.allPhotos()" [linkParams]="{ from: 'all' }" />
    }
  </div>
  <div role="tabpanel" [hidden]="tab() !== 'albums'">
    @if (albumsSeen()) {
      <app-album-grid [albums]="gallery.albums()" />
    }
  </div>
</app-content-shell>
