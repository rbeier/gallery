<!--
  Left-to-right masonry: photos are distributed round-robin across columns in the
  component (item i -> column i % count), so the newest photo is top-left and the
  next one sits to its right. Column count tracks the CSS breakpoints (2 / 3 / 4).
-->
<div class="flex gap-[14px]">
  @for (column of columns(); track $index) {
    <div class="flex flex-1 flex-col gap-[14px]">
      @for (photo of column; track photo.id) {
        <app-photo-tile
          class="block"
          [photo]="photo"
          [linkParams]="linkParams()"
        />
      }
    </div>
  }
</div>
