<!--
  CSS multi-column masonry: the column count is driven by CSS breakpoints (2 /
  3 / 4), so it's correct on the very first paint with no JS measurement — no
  reflow from 3→2 columns after hydration.
-->
<div class="columns-2 gap-[14px] d:columns-3 w:columns-4">
  @for (photo of photos(); track photo.id) {
    <app-photo-tile
      class="mb-[14px] block break-inside-avoid"
      [photo]="photo"
      [linkParams]="linkParams()"
    />
  }
</div>
