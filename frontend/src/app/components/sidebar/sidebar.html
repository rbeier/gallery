@if (viewport.isDesktop()) {
  <!-- Brand -->
  <a
    routerLink="/"
    class="w-fit cursor-pointer font-serif text-[21px] font-medium tracking-[-.01em] text-ink"
    >{{ gallery.photographer }}</a
  >

  <!-- Breadcrumb -->
  @if (crumbs().length) {
    <nav
      aria-label="Breadcrumb"
      class="mt-5 flex flex-col gap-[3px] font-mono text-[11px] tracking-[.06em]"
    >
      <a [routerLink]="crumbs()[0].link" class="w-fit cursor-pointer text-muted hover:text-ink"
        >← {{ crumbs()[0].label }}</a
      >
      <span class="text-ink/70">{{ crumbs()[crumbs().length - 1].label }}</span>
    </nav>
  }

  <!-- Primary nav -->
  <nav class="mt-9 flex flex-col gap-[14px]" aria-label="Primary">
    <a
      routerLink="/"
      [routerLinkActiveOptions]="{ exact: true }"
      routerLinkActive
      #work="routerLinkActive"
      [class.text-ink]="work.isActive"
      [class.font-medium]="work.isActive"
      class="w-fit cursor-pointer text-[14px] text-muted hover:text-ink"
      >Work</a
    >
    <a
      routerLink="/albums"
      routerLinkActive
      #alb="routerLinkActive"
      [class.text-ink]="alb.isActive"
      [class.font-medium]="alb.isActive"
      class="w-fit cursor-pointer text-[14px] text-muted hover:text-ink"
      >Albums</a
    >
    <a
      routerLink="/search"
      routerLinkActive
      #srch="routerLinkActive"
      [class.text-ink]="srch.isActive"
      [class.font-medium]="srch.isActive"
      class="w-fit cursor-pointer text-[14px] text-muted hover:text-ink"
      >Search</a
    >
  </nav>

  <!-- Theme toggle, pinned to bottom -->
  <button
    type="button"
    (click)="theme.toggle()"
    class="mt-auto w-fit cursor-pointer border-0 bg-transparent p-0 text-[12px] text-muted hover:text-ink"
  >
    {{ theme.label() }}
  </button>
} @else {
  <!-- Mobile: compact top bar -->
  <a
    routerLink="/"
    class="cursor-pointer font-serif text-[clamp(18px,2vw,21px)] font-medium tracking-[-.01em]"
    >{{ gallery.photographer }}</a
  >
  <div class="flex items-center gap-5">
    <a routerLink="/search" aria-label="Search" class="cursor-pointer text-[18px] leading-none">⌕</a>
    <a routerLink="/albums" aria-label="Albums" class="cursor-pointer text-[15px] leading-none">▦</a>
    <button
      type="button"
      (click)="theme.toggle()"
      [attr.aria-label]="theme.isDark() ? 'Switch to light theme' : 'Switch to dark theme'"
      class="cursor-pointer border-0 bg-transparent p-0 text-[15px] leading-none text-ink"
    >
      {{ theme.glyph() }}
    </button>
  </div>
}
