<div class="mt-5">
  <div class="mb-2.25 font-mono text-[10px] uppercase tracking-label text-muted">
    {{ group().label }}
  </div>
  <div class="flex flex-wrap gap-1.75">
    @for (opt of group().options; track opt) {
      @if (opt) {
        @let active = selected().includes(opt);
        <button
          type="button"
          [attr.aria-pressed]="active"
          (click)="toggle.emit(opt)"
          class="rounded-pill border px-2.75 py-1.5 font-mono text-[11px] transition-colors focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ink"
          [class.border-ink]="active"
          [class.bg-ink]="active"
          [class.text-bg]="active"
          [class.border-line]="!active"
          [class.text-ink]="!active"
        >
          {{ opt }}
        </button>
      }
    }
  </div>
</div>
