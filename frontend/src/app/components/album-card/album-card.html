<a
  appInViewport
  #vp="inViewport"
  [routerLink]="['/albums', album().id]"
  class="block focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ink"
>
  <div
    class="relative w-full overflow-hidden rounded-card"
    style="aspect-ratio: 4/3"
    [style.background]="album().grad"
  >
    <!-- Inline blur placeholder (data URI) paints instantly over the gradient. -->
    @if (album().coverLqip; as lqip) {
      <img
        [src]="lqip"
        alt=""
        aria-hidden="true"
        decoding="async"
        class="absolute inset-0 h-full w-full scale-110 object-cover blur-xl"
      />
    }
    @if (vp.visible() && album().cover; as cover) {
      <img
        [src]="cover"
        [attr.srcset]="album().coverSrcset"
        sizes="(min-width:880px) calc(33.33vw - 45px), calc(50vw - 28px)"
        alt=""
        loading="lazy"
        decoding="async"
        (load)="loaded.set(true)"
        [style.opacity]="loaded() ? 1 : 0"
        class="absolute inset-0 h-full w-full object-cover transition-opacity duration-[400ms] ease-out"
      />
    }
  </div>
  <div class="mt-3 flex items-baseline justify-between gap-3">
    <div class="font-serif font-medium text-[clamp(17px,2.2vw,20px)]">{{ album().name }}</div>
    <div class="whitespace-nowrap font-mono text-[11px] text-muted">{{ album().count }}</div>
  </div>
  <div class="mt-1 text-[13px] leading-[1.5] text-muted">{{ album().description }}</div>
</a>
