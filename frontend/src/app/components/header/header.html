<!--
  Minimal top bar shown on every page except the full-bleed photo viewer.
  Inner column widths mirror content-shell so the brand aligns with page content.
-->
<div
  class="mx-auto flex w-full max-w-[640px] items-center justify-between gap-4 px-5 d:max-w-[1180px] d:gap-6 d:px-10 w:max-w-[1500px]"
>
  <app-brand />

  <!-- Search link (search is a standalone page) + theme toggle. -->
  <div class="flex flex-none items-center gap-4">
    <a
      routerLink="/search"
      aria-label="Search"
      class="cursor-pointer text-muted hover:text-ink"
    >
      <svg viewBox="0 -960 960 960" aria-hidden="true" class="h-[22px] w-[22px] fill-current">
        <path
          d="M787.64-137.33 530.87-394.1q-29.9 25.86-69.43 40.06-39.54 14.19-81.75 14.19-101.9 0-172.72-70.74-70.81-70.74-70.81-171.85 0-101.1 70.74-171.84 70.74-70.74 172.32-70.74 100.92 0 171.64 70.74 70.73 70.74 70.73 171.75 0 42.4-14.39 81.94-14.38 39.54-40.53 70.69l257.17 256.1-36.2 36.47ZM379.28-390.1q80.24 0 136.15-55.96 55.9-55.97 55.9-136.38t-55.9-136.37q-55.91-55.96-136.15-55.96-80.69 0-136.78 55.96t-56.09 136.37q0 80.41 56.09 136.38 56.09 55.96 136.78 55.96Z"
        />
      </svg>
    </a>
    <button
      type="button"
      (click)="theme.toggle()"
      [attr.aria-label]="theme.isDark() ? 'Switch to light theme' : 'Switch to dark theme'"
      class="flex cursor-pointer border-0 bg-transparent p-0 text-muted hover:text-ink"
    >
      <svg viewBox="0 -960 960 960" aria-hidden="true" class="h-[22px] w-[22px] fill-current">
        <path
          d="M480-140q-124.26 0-212.13-85.81Q180-311.62 180-435.21q0-62.53 23.66-114.89 23.65-52.36 64.19-94.05L480-852.31l212.15 208.16q40.54 41.69 64.19 94.62Q780-496.59 780-435.21q0 122.93-87.54 209.07Q604.92-140 480-140Zm0-50.26v-591.28L302.15-606.36q-35.41 34.49-53.65 77.33-18.24 42.85-18.24 93.82 0 101.88 73.18 173.42 73.18 71.53 176.56 71.53Z"
        />
      </svg>
    </button>
  </div>
</div>
