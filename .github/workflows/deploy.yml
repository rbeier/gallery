name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Downcase repository name
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Strapi CMS image
        uses: docker/build-push-action@v5
        with:
          context: ./cms
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/cms:latest
            ghcr.io/${{ env.REPO_LOWER }}/cms:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Angular Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/frontend:latest
            ghcr.io/${{ env.REPO_LOWER }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Load docker-compose.yml content
        run: |
          echo "DOCKER_COMPOSE_CONTENT<<EOF" >> $GITHUB_ENV
          cat docker-compose.yml >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: REPO_LOWER,DOCKER_COMPOSE_CONTENT
          script: |
            # Ensure deployment directory exists
            mkdir -p /opt/rbeier.dev
            cd /opt/rbeier.dev

            # Create or update .env file
            cat << EOF > .env
            CMS_IMAGE=ghcr.io/${REPO_LOWER}/cms:latest
            FRONTEND_IMAGE=ghcr.io/${REPO_LOWER}/frontend:latest
            APP_KEYS="${{ secrets.APP_KEYS }}"
            API_TOKEN_SALT="${{ secrets.API_TOKEN_SALT }}"
            ADMIN_JWT_SECRET="${{ secrets.ADMIN_JWT_SECRET }}"
            JWT_SECRET="${{ secrets.JWT_SECRET }}"
            TRANSFER_TOKEN_SALT="${{ secrets.TRANSFER_TOKEN_SALT }}"
            ENCRYPTION_KEY="${{ secrets.ENCRYPTION_KEY }}"
            GOOGLE_MAPS_API_KEY="${{ secrets.GOOGLE_MAPS_API_KEY }}"
            STRAPI_BASE_URL="${{ secrets.STRAPI_BASE_URL }}"
            EOF

            # Write docker-compose.yml file from env variable
            printf '%s\n' "$DOCKER_COMPOSE_CONTENT" > docker-compose.yml

            # Pull updated images from GHCR
            docker compose pull

            # Run compose in detached mode
            docker compose up -d

            # Clean up old unused docker images
            docker image prune -f
