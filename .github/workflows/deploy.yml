name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Ensure deployment directory exists
            mkdir -p /opt/rbeier.dev
            cd /opt/rbeier.dev

            # Initialize and fetch git safely without failing on non-empty directories (like cms-data/)
            if [ ! -d ".git" ]; then
              git init
              git remote add origin git@github.com:${{ github.repository }}.git
              git fetch origin
              git checkout -f main
            else
              git fetch origin
              git checkout -f main
            fi

            # Pre-create persistent directories to ensure they are owned by the deployment SSH user
            mkdir -p cms-data/database cms-data/uploads

            # Create or update .env file
            cat << EOF > .env
            CMS_IMAGE=gallery-cms:latest
            FRONTEND_IMAGE=gallery-frontend:latest
            APP_KEYS="${{ secrets.APP_KEYS }}"
            API_TOKEN_SALT="${{ secrets.API_TOKEN_SALT }}"
            ADMIN_JWT_SECRET="${{ secrets.ADMIN_JWT_SECRET }}"
            JWT_SECRET="${{ secrets.JWT_SECRET }}"
            TRANSFER_TOKEN_SALT="${{ secrets.TRANSFER_TOKEN_SALT }}"
            ENCRYPTION_KEY="${{ secrets.ENCRYPTION_KEY }}"
            GOOGLE_MAPS_API_KEY="${{ secrets.GOOGLE_MAPS_API_KEY }}"
            STRAPI_BASE_URL="${{ secrets.STRAPI_BASE_URL }}"
            EOF

            # Build and restart containers natively on the ARM64 VPS host
            docker compose up --build -d

            # Clean up old unused docker images to save space
            docker image prune -f
